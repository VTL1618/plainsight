id: PS3-credential-file-paths
category: PS3-exfiltration-primitives
severity: high
title: Reading a credential store
description: >-
  This file points the agent at a file that holds secrets: cloud access keys,
  a login token, or a browser's saved cookies. Reading one of these is the
  first step of stealing credentials, and no ordinary skill needs to open them.
rationale: >-
  Files like ~/.aws/credentials, the GitHub CLI's hosts.yml, or a browser
  cookie database exist to store live secrets. A skill that reads them is
  lining up an exfiltration: get the secret into the model's context, then
  send it somewhere. This rule flags the credential-store paths that have no
  routine reason to appear in a skill. It leaves ordinary key setup alone,
  which is why plain SSH paths are not on the list.
remediation: >-
  Remove the instruction to read the credential file. If a skill genuinely
  needs a secret, it should take it from an environment variable the user sets
  on purpose, never by reading a credential store off disk.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://arxiv.org/abs/2606.18198
targets:
  - skill
  - slash-command
  - hooks-config
matcher:
  type: substring
  phrases:
    - ".aws/credentials"
    - ".config/gh/hosts.yml"
    - ".netrc"
    - "cookies.sqlite"
    - "login.keychain"
