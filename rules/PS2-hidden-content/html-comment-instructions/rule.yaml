id: PS2-html-comment-instructions
category: PS2-hidden-content
severity: high
title: Instructions hidden in an HTML comment
description: >-
  This file hides an instruction inside an HTML comment. A comment shows up as
  nothing when the Markdown is rendered, so a reviewer reading the preview
  never sees it, but the model reads the comment right along with the rest of
  the file and can act on it.
rationale: >-
  Ordinary HTML comments hold tooling directives and editorial notes. This
  rule stays quiet on those and fires only when a comment carries language
  meant to redirect the agent, which is the whole point of putting an
  instruction where the reviewer's eye will skip it.
remediation: >-
  Delete the comment. If the text is a genuine note for maintainers, move it
  somewhere a reviewer will actually read it, and make sure it is not phrased
  as an instruction to the agent.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://arxiv.org/abs/2606.18198
targets:
  - skill
matcher:
  type: html-comment
  phrases:
    - "ignore previous instructions"
    - "ignore all previous instructions"
    - "disregard your system prompt"
    - "you are now"
    - "do not tell the user"
