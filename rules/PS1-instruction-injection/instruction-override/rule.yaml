id: PS1-instruction-override
category: PS1-instruction-injection
severity: high
title: Instruction-override phrasing
description: >-
  This file tells the agent to throw out its existing instructions and follow
  new ones instead. That is the classic prompt-injection move: whatever the
  skill or the user set up gets overridden by text an attacker planted, so the
  agent starts taking orders from the file.
rationale: >-
  Phrases like "ignore all previous instructions" or "disregard your system
  prompt" exist to detach the model from its actual task and hand control to
  the attacker. Legitimate skills give instructions; they do not ask the model
  to discard the ones already in force.
remediation: >-
  Remove the override phrasing. If the skill really needs to change behavior
  partway through, say what to do next in plain terms instead of telling the
  model to ignore what came before.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://arxiv.org/abs/2603.22489
targets:
  - skill
  - mcp-config
  - marketplace-manifest
matcher:
  type: substring
  phrases:
    - "ignore previous instructions"
    - "ignore all previous instructions"
    - "ignore all prior instructions"
    - "ignore the above instructions"
    - "disregard your system prompt"
    - "disregard the previous instructions"
    - "disregard all previous instructions"
    - "forget all previous instructions"
    - "forget your previous instructions"
