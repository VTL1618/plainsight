id: PS1-conceal-from-user
category: PS1-instruction-injection
severity: high
title: Instruction to hide an action from the user
description: >-
  This file tells the agent to do something and keep it from the person using
  it. Hiding a step from the user is how an attacker gets an agent to act
  against its own operator without the operator noticing.
rationale: >-
  A skill asking the model to conceal what it just did, specifically from the
  user, has no benign reason to do so. The concealment is the tell: the action
  being hidden is one the user would object to if they saw it.
remediation: >-
  Remove the instruction to hide the step. Anything a skill does on the user's
  behalf should be visible to the user; if a step cannot be shown to them, it
  should not run.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://arxiv.org/abs/2606.18198
targets:
  - skill
  - mcp-config
  - marketplace-manifest
  - slash-command
  - hooks-config
matcher:
  type: substring
  phrases:
    - "do not tell the user"
    - "don't tell the user"
    - "without telling the user"
    - "do not mention this to the user"
    - "do not reveal this to the user"
    - "do not let the user know"
    - "hide this from the user"
    - "keep this from the user"
