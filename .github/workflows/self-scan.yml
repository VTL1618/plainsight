name: Self-scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  self-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan this repository with plainsight
        uses: ./action
        with:
          path: .

      # Fork PRs cannot get security-events: write, so skip the upload there;
      # the scan step above still gates the build.
      - name: Upload SARIF to code scanning
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: plainsight.sarif
